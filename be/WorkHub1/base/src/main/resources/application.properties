# ============================================
# Database Configuration (Docker)
# ============================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:root}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:123456}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/recruitment?allowPublicKeyRetrieval=true&serverTimezone=UTC}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ============================================
# HTTP Configuration
# ============================================
quarkus.http.host=${QUARKUS_HTTP_HOST:0.0.0.0}
quarkus.http.port=${QUARKUS_HTTP_PORT:8081}

# ============================================
# JWT Configuration
# ============================================
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://example.com
smallrye.jwt.sign.key.location=privateKey.pem

# ============================================
# CORS Configuration
# ============================================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# ============================================
# Logging Configuration
# ============================================
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.json=false
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# ============================================
# Health Check
# ============================================
quarkus.smallrye-health.root-path=/q/health

# ============================================
# Mail Configuration
# ============================================

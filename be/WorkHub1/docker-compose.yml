version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: workhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-recruitment}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - workhub-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-123456789}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend Application
  backend:
    build:
      context: ./base
      dockerfile: src/main/docker/Dockerfile.jvm

    container_name: workhub-backend

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-recruitment}?allowPublicKeyRetrieval=true&serverTimezone=UTC
      QUARKUS_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-root}
      QUARKUS_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - workhub-network

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/q/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  workhub-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local